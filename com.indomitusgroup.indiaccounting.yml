app-id: com.indomitusgroup.indiaccounting
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

command: indiaccounting

finish-args:
  # Display (Tauri / WebKitGTK)
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU acceleration for the webview
  - --device=dri
  # Network: license activation, sending invoices/estimates by email (SMTP),
  # in-app purchase/upgrade links, and update checks.
  - --share=network
  # Save/open backups, CSV imports/exports, and PDF invoices. Arbitrary file
  # picks (e.g. receipt attachments) go through the file-chooser portal and do
  # not need extra permissions.
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

# NOTE: Receipt OCR shells out to the system `tesseract` binary and degrades
# gracefully when it is absent (the rest of the app is unaffected). To enable
# OCR inside the sandbox, add the leptonica + tesseract + tessdata-eng modules
# documented in flatpak/README.md before the `indiaccounting` module below.

modules:
  - name: indiaccounting
    buildsystem: simple
    build-commands:
      - install -Dm755 indiaccounting ${FLATPAK_DEST}/bin/indiaccounting
      - install -Dm644 com.indomitusgroup.indiaccounting.desktop ${FLATPAK_DEST}/share/applications/com.indomitusgroup.indiaccounting.desktop
      - install -Dm644 com.indomitusgroup.indiaccounting.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.indomitusgroup.indiaccounting.metainfo.xml
      - install -Dm644 icons/32x32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/256x256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/512x512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/com.indomitusgroup.indiaccounting.png
    sources:
      - type: archive
        # TODO before submission: build the release, run flatpak/preparerelease.sh,
        # upload the tarball, and paste its real URL + sha256 here.
        url: https://downloads.indomitusgroup.com/indiaccounting/indiaccounting-1.0.0-linux-x86_64.tar.gz
        sha256: 09580d433341faa310fdfad4dffcd29ceb9e9eff9bebdcde2d181164b9410dae
