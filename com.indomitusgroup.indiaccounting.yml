app-id: com.indomitusgroup.indiaccounting
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

command: indiaccounting

finish-args:
  # Display (Tauri / WebKitGTK)
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU acceleration for the WebKitGTK webview
  - --device=dri
  # Outbound network is required for two features that cannot use a portal:
  #   * License activation / verification — HTTPS requests to the license server
  #     (api.indomitusgroup.com) via reqwest.
  #   * Sending invoices and estimates by email — a direct SMTP connection to the
  #     user's own configured mail server via lettre.
  - --share=network

modules:
  - name: indiaccounting
    buildsystem: simple
    build-commands:
      - install -Dm755 indiaccounting ${FLATPAK_DEST}/bin/indiaccounting
      - install -Dm644 com.indomitusgroup.indiaccounting.desktop ${FLATPAK_DEST}/share/applications/com.indomitusgroup.indiaccounting.desktop
      - install -Dm644 com.indomitusgroup.indiaccounting.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.indomitusgroup.indiaccounting.metainfo.xml
      - install -Dm644 icons/32x32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/256x256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/512x512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/com.indomitusgroup.indiaccounting.png
    sources:
      - type: archive
        url: https://downloads.indomitusgroup.com/indiaccounting/indiaccounting-1.0.0-linux-x86_64.tar.gz
        sha256: b77429cb7f8c9eb2a120e528f650d01d8259c2b7a92bee2d1bd8a763ae2b0620

